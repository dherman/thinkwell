name: Smoke Tests

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 6am UTC
  workflow_dispatch:       # Manual trigger

  # TODO: Add a parallel Kiro CLI smoke test job once headless auth is fixed.
  # Kiro's SIGV4 auth (AWS IAM credentials via OIDC federation) is broken in
  # the current CLI — regression from Amazon Q Developer CLI migration.
  # Tracking: https://github.com/kirodotdev/Kiro/issues/5938
  # When fixed, add a `smoke-kiro` job using setup-kiro-cli-action with
  # enable-sigv4 and THINKWELL_AGENT=kiro.

jobs:
  preflight:
    name: Check secrets
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.check.outputs.has-key }}
    steps:
      - name: Check for API key
        id: check
        run: |
          if [ -n "$KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::ANTHROPIC_API_KEY is not configured — skipping smoke tests"
            echo "has-key=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  smoke:
    name: Smoke Tests (Claude)
    needs: preflight
    if: needs.preflight.outputs.has-key == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run smoke tests
        run: pnpm smoke
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ENABLE_TOOL_SEARCH: '0'
